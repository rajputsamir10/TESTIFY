<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ subject }}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f4f6ff;
        color: #242f41;
        font-family: Arial, sans-serif;
      }
      .wrapper {
        width: 100%;
        padding: 24px 12px;
      }
      .card {
        max-width: 640px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #dde6f7;
        border-radius: 16px;
        overflow: hidden;
      }
      .header {
        padding: 20px 24px;
        background: linear-gradient(120deg, #4a40e0, #702ae1);
        color: #ffffff;
      }
      .brand {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
      }
      .subtitle {
        margin: 4px 0 0;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0.9;
      }
      .body {
        padding: 24px;
      }
      .subject {
        margin: 0 0 14px;
        font-size: 20px;
        line-height: 1.3;
      }
      .line {
        margin: 0 0 10px;
        font-size: 14px;
        line-height: 1.55;
        color: #374151;
      }
      .footer {
        padding: 16px 24px 20px;
        border-top: 1px solid #eef2ff;
        font-size: 12px;
        color: #6b7280;
      }
      .footer p {
        margin: 0;
      }
      @media (max-width: 640px) {
        .header,
        .body,
        .footer {
          padding-left: 16px;
          padding-right: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <div class="header">
          <p class="brand">Testify</p>
          <p class="subtitle">Digital Curator</p>
        </div>

        <div class="body">
          <h1 class="subject">{{ subject }}</h1>
          {% if message_lines %}
            {% for line in message_lines %}
              <p class="line">{{ line }}</p>
            {% endfor %}
          {% else %}
            <p class="line">You have a new update from Testify.</p>
          {% endif %}
        </div>

        <div class="footer">
          <p>This is an automated message from Testify. Please do not reply.</p>
          <p style="margin-top: 8px;">&copy; {{ year }} Testify Systems</p>
        </div>
      </div>
    </div>
  </body>
</html>
